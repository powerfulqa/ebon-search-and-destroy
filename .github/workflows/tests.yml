name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lua-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.4
        run: sudo apt-get install -y lua5.4

      - name: Run unit tests
        run: lua5.4 tests/run_tests.lua
